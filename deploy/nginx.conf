# =============================================================================
# Nginx Reverse Proxy Configuration — Site Audit Agent
# APM Site Assessment
# =============================================================================
#
# BEFORE USING THIS FILE:
#   1. Replace "server_name _;" with your actual domain, e.g.:
#          server_name auditapp.example.com www.auditapp.example.com;
#   2. Run Certbot to obtain and inject SSL certificates:
#          sudo certbot --nginx -d yourdomain.com
#      Certbot will automatically inject the ssl_certificate and
#      ssl_certificate_key directives into the HTTPS server block.
#   3. After Certbot completes, reload Nginx:
#          sudo systemctl reload nginx
#
# DO NOT pre-configure ssl_certificate directives here — Certbot must inject
# them itself. Pre-configured directives will conflict with Certbot injection.
# =============================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;

    # Replace with your actual domain before use.
    # Use "server_name _;" to match any host (IP-only access or placeholder).
    server_name _;

    # 301 permanent redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server block — Certbot will inject ssl_certificate directives here
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    # Replace with your actual domain before use.
    server_name _;

    # -------------------------------------------------------------------------
    # Certbot will insert ssl_certificate and ssl_certificate_key lines here
    # when you run: sudo certbot --nginx -d yourdomain.com
    # Do not add them manually unless you are managing certificates yourself.
    # -------------------------------------------------------------------------

    # Proxy all requests to Streamlit on localhost
    location / {
        proxy_pass http://127.0.0.1:8501;

        # Required for WebSocket support (Streamlit real-time UI)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering — required for WebSocket frame passthrough
        proxy_buffering off;

        # Extended timeout to accommodate long report generation (WeasyPrint + AI)
        proxy_read_timeout 300s;
    }
}
